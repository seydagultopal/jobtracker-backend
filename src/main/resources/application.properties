spring.application.name=jobtracker

# PostgreSQL Veritabanı Bağlantısı
spring.datasource.url=jdbc:postgresql://localhost:5432/jobtracker_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA / Hibernate Ayarları
# update: Entity'lerdeki değişikliklere göre tabloları otomatik günceller (Geliştirme aşaması için idealdir)
spring.jpa.hibernate.ddl-auto=update

# Çalıştırılan SQL sorgularını konsolda düzgün bir formatta görmek için
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# --- MAIL AYARLARI ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pebble.app.contact@gmail.com
spring.mail.password=mezzltwvqvbrxuje
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# --- KAFKA CONSUMER AYARLARI ---
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=pebble-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*